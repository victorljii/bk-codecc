name: Tag Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preci-server:
    name: Build PreCI Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build PreCI Server (all platforms)
        working-directory: src/preci/preci_server
        run: |
          version="$(basename $GITHUB_REF)"
          make init
          make build-win VERSION="$version"
          make build-linux VERSION="$version"
          make build-mac-amd64 VERSION="$version"
          make build-mac-arm64 VERSION="$version"
          ls -la bin/dist
      - uses: actions/upload-artifact@v4
        with:
          name: preci-server
          path: src/preci/preci_server/bin/dist/*.zip
          retention-days: 5
          overwrite: true

  preci-jetbrains-plugin:
    name: Build PreCI JetBrains Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false
      - name: Build JetBrains Plugin
        working-directory: src/preci/preci_jetbrains_plugin
        run: |
          chmod +x gradlew
          ./gradlew buildPlugin
          cd build/distributions
          ls -la
          # 将生成的压缩包重命名为固定名称
          mv *.zip preci_jetbrains_plugin.zip
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: preci-jetbrains-plugin
          path: src/preci/preci_jetbrains_plugin/build/distributions/preci_jetbrains_plugin.zip
          retention-days: 5
          overwrite: true

  releaseAll:
    name: Release All
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [preci-server, preci-jetbrains-plugin]
    steps:
      - name: download preci-server
        uses: actions/download-artifact@v4
        with:
          name: preci-server
          path: ./preci-server-dist
      - name: download preci-jetbrains-plugin
        uses: actions/download-artifact@v4
        with:
          name: preci-jetbrains-plugin
          path: ./preci-jetbrains-plugin-dist
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: bk-codecc ${{ github.ref_name }}
          draft: true
          prerelease: true
          files: |
            ./preci-server-dist/preci-${{ github.ref_name }}-win-amd64.zip
            ./preci-server-dist/preci-${{ github.ref_name }}-linux-amd64.zip
            ./preci-server-dist/preci-${{ github.ref_name }}-mac-amd64.zip
            ./preci-server-dist/preci-${{ github.ref_name }}-mac-arm64.zip
            ./preci-jetbrains-plugin-dist/preci_jetbrains_plugin.zip